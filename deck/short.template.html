<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>browser-api · 2-min short · Camera Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181511; --notes-bg:#14110D; --code-bg:#0F0D0A;
    --cream:#F4F0E6; --body:#C9C2B4; --body2:#A39C8D;
    --muted:#9C9484; --muted2:#6E675A;
    --coral:#E0795A; --purple:#897CF0; --green:#7BB58A; --gold:#D9C46A;
    --card:#221E17; --card2:#2C2820;
    --hair:rgba(244,240,230,.10); --hair2:rgba(244,240,230,.14);
    --disp:'Bricolage Grotesque',sans-serif;
    --sans:'Hanken Grotesk',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--cream);
    font-family:var(--sans);
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- stage + scaling ---------------------------------------------------- */
  #stage{ position:relative; }
  #deck{
    position:relative;
    width:1040px; height:1067px;
    transform-origin:center center;
    transform:scale(var(--s,0.8));
    display:flex;
  }
  body.record #deck{ width:600px; }
  body.record .notes,
  body.record .seam,
  body.record .frame-edge{ display:none !important; }

  /* ---- the recorded 9:16 frame ------------------------------------------- */
  .frame{
    position:relative; flex:0 0 600px; width:600px; height:1067px;
    background:var(--bg);
    border:1px solid var(--hair); border-right:none;
    display:flex; flex-direction:column; overflow:hidden;
  }
  body.record .frame{ border-right:1px solid var(--hair); }

  .rec{
    position:absolute; top:26px; left:26px; z-index:5;
    display:flex; align-items:center; gap:9px;
    background:rgba(224,121,90,.14); border:1px solid rgba(224,121,90,.4);
    border-radius:999px; padding:6px 13px;
  }
  .rec .dot{ width:8px; height:8px; border-radius:50%; background:var(--coral); animation:recpulse 1.4s infinite; }
  .rec .lbl{ font-family:var(--mono); font-size:11px; letter-spacing:.16em; color:var(--coral); }
  @keyframes recpulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

  .res{
    position:absolute; top:30px; right:26px; z-index:5;
    font-family:var(--mono); font-size:11px; letter-spacing:.1em; color:var(--muted2);
  }

  .kicker{ font-family:var(--mono); font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--coral); }
  .frame h1{
    font-family:var(--disp); font-weight:800; letter-spacing:-.03em;
    color:var(--cream); line-height:.98;
  }
  .frame .sub{ font-family:var(--sans); color:var(--body2); }
  .accent-rule{ height:6px; background:var(--coral); border-radius:5px; transform:rotate(-.6deg); }

  /* content-top / head-bottom split */
  .split-top{ flex:0 0 54%; padding:78px 48px 0; display:flex; flex-direction:column; }
  .head{
    flex:1; position:relative; overflow:hidden;
    background:radial-gradient(120% 90% at 50% 30%, #2A2016 0%, #0F0D0A 70%);
  }
  .head .face{ position:absolute; top:52%; left:50%; transform:translate(-50%,-50%); width:180px; height:180px; border-radius:50%; background:radial-gradient(circle at 50% 38%, #4A3A2A 0%, #241B12 72%); box-shadow:0 0 0 1px rgba(244,240,230,.08); }
  .head .shoulders{ position:absolute; bottom:150px; left:50%; transform:translateX(-50%); width:320px; height:170px; border-radius:160px 160px 0 0; background:radial-gradient(120% 100% at 50% 0%, #3A2C1E 0%, #1A130C 78%); }
  .head .tag{ position:absolute; top:22px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#8C8474; background:rgba(15,13,10,.6); border:1px solid var(--hair); border-radius:999px; padding:6px 14px; white-space:nowrap; }
  .head .wave{ position:absolute; bottom:26px; left:50%; transform:translateX(-50%); display:flex; align-items:flex-end; gap:5px; height:34px; }
  .head .wave span{ width:5px; background:var(--coral); border-radius:3px; animation:eq 1s ease-in-out infinite; }
  @keyframes eq{ 0%,100%{transform:scaleY(.5)} 50%{transform:scaleY(1)} }
  .split-marker{ height:0; border-top:2px dashed rgba(137,124,240,.5); }

  /* full-bleed content */
  .full{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:48px; }
  .pip{ position:absolute; bottom:36px; right:36px; width:120px; height:120px; border-radius:50%; overflow:hidden; border:2px solid var(--hair2); background:radial-gradient(circle at 50% 36%, #4A3A2A 0%, #1A130C 74%); }
  .pip::after{ content:""; position:absolute; bottom:-14px; left:50%; transform:translateX(-50%); width:88px; height:56px; border-radius:52px 52px 0 0; background:#3A2C1E; }
  .pip-cap{ position:absolute; bottom:26px; left:48px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; color:var(--muted2); }

  /* code block */
  .code{ background:var(--code-bg); border:1px solid var(--hair); border-radius:8px; padding:18px 20px; font-family:var(--mono); font-size:17px; line-height:1.65; }
  .code .g{ color:var(--green); } .code .c{ color:var(--cream); } .code .m{ color:var(--muted); }
  .code .p{ color:var(--purple); } .code .o{ color:var(--coral); }

  /* generic card used for repo / deploy panels */
  .panel{ background:var(--card); border:1px solid var(--hair); border-radius:12px; padding:26px 26px; }
  .row{ display:flex; align-items:center; gap:12px; }
  .list{ display:flex; flex-direction:column; gap:16px; }
  .li{ display:flex; align-items:center; gap:13px; font-family:var(--sans); font-weight:600; font-size:22px; color:var(--body); }
  .li .bx{ flex:0 0 auto; width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:13px; }
  .chip{ font-family:var(--mono); font-size:13px; letter-spacing:.08em; padding:6px 12px; border-radius:999px; border:1px solid var(--hair); color:var(--muted); }

  /* browser screenshot mock frame */
  .shot{ border:1px solid var(--hair2); border-radius:12px; overflow:hidden; box-shadow:0 14px 40px rgba(0,0,0,.4); background:#0F0D0A; }
  .shot .bar{ height:38px; display:flex; align-items:center; gap:8px; padding:0 14px; background:#221E17; border-bottom:1px solid var(--hair); }
  .shot .bar .d{ width:11px; height:11px; border-radius:50%; }
  .shot .bar .url{ margin-left:10px; flex:1; height:22px; border-radius:6px; background:#0F0D0A; border:1px solid var(--hair); display:flex; align-items:center; padding:0 12px; font-family:var(--mono); font-size:12px; color:var(--muted); }
  .shot img{ display:block; width:100%; height:auto; }

  /* ---- off-frame notes (teleprompter) ------------------------------------ */
  .seam{ position:absolute; left:600px; top:0; bottom:0; width:0; border-left:2px dashed rgba(224,121,90,.55); z-index:6; }
  .frame-edge{ position:absolute; left:600px; top:50%; transform:translate(-50%,-50%) rotate(90deg); z-index:7; background:var(--coral); color:var(--bg); font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; padding:5px 11px; border-radius:999px; white-space:nowrap; }
  .notes{ width:440px; height:1067px; background:var(--notes-bg); border:1px solid var(--hair); border-left:none; padding:52px 40px; display:flex; flex-direction:column; }
  .notes .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:36px; }
  .notes .top .l{ font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--coral); }
  .notes .top .c{ font-family:var(--mono); font-size:11px; color:var(--muted2); }
  .now{ background:rgba(224,121,90,.10); border-left:4px solid var(--coral); border-radius:0 6px 6px 0; padding:22px; margin-bottom:32px; }
  .now .n{ font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--coral); margin-bottom:11px; }
  .now .t{ font-family:var(--disp); font-weight:700; font-size:36px; line-height:1.06; letter-spacing:-.02em; color:var(--cream); }
  .beats{ display:flex; flex-direction:column; gap:24px; }
  .beat{ display:flex; gap:12px; align-items:baseline; }
  .beat .sq{ flex:0 0 9px; width:9px; height:9px; border-radius:2px; background:var(--purple); margin-top:8px; }
  .beat .tx{ font-family:var(--sans); font-weight:600; font-size:25px; line-height:1.25; color:var(--body); }
  .notes .foot{ margin-top:auto; font-family:var(--mono); font-size:11px; letter-spacing:.12em; color:var(--muted2); }

  /* per-scene progress bar inside the frame */
  .sceneprog{ position:absolute; left:0; bottom:0; height:4px; width:100%; background:rgba(244,240,230,.08); z-index:8; }
  .sceneprog i{ display:block; height:100%; width:0; background:var(--coral); }

  /* ---- controls ----------------------------------------------------------- */
  #ctl{
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
    display:flex; align-items:center; gap:14px; z-index:50;
    background:rgba(15,13,10,.82); border:1px solid var(--hair); backdrop-filter:blur(8px);
    border-radius:999px; padding:9px 16px;
    font-family:var(--mono); font-size:12px; color:var(--muted);
    transition:opacity .3s; user-select:none;
  }
  #ctl button{ background:none; border:none; color:var(--cream); cursor:pointer; font-family:var(--mono); font-size:13px; padding:5px 8px; border-radius:8px; }
  #ctl button:hover{ background:rgba(244,240,230,.08); }
  #ctl .sep{ width:1px; height:18px; background:var(--hair); }
  #ctl .time{ color:var(--muted); min-width:74px; text-align:center; }
  #ctl .dots{ display:flex; gap:6px; }
  #ctl .dots b{ width:8px; height:8px; border-radius:50%; background:rgba(244,240,230,.2); cursor:pointer; }
  #ctl .dots b.on{ background:var(--coral); }
  body.record #ctl{ opacity:0; }
  body.record:hover #ctl{ opacity:1; }
  #hint{ position:fixed; left:16px; bottom:18px; z-index:50; font-family:var(--mono); font-size:11px; color:var(--muted2); line-height:1.7; }
  body.record #hint{ opacity:0; }
</style>
</head>
<body>
  <div id="stage">
    <div id="deck">
      <div class="frame">
        <div class="rec"><span class="dot"></span><span class="lbl">REC</span></div>
        <div class="res" id="res">1080 × 1920 · 9:16</div>
        <div id="framebody" style="display:flex;flex-direction:column;flex:1;"></div>
        <div class="sceneprog"><i id="sp"></i></div>
      </div>
      <div class="seam"></div>
      <div class="frame-edge">Frame edge</div>
      <div class="notes" id="notes"></div>
    </div>
  </div>

  <div id="ctl">
    <button id="prev" title="Previous (←)">◀</button>
    <button id="play" title="Play / pause (space)">▶ Play</button>
    <button id="next" title="Next (→)">▶</button>
    <span class="sep"></span>
    <span class="time" id="time">0:00 / 2:00</span>
    <span class="sep"></span>
    <span class="dots" id="dots"></span>
    <span class="sep"></span>
    <button id="mode" title="Record mode — clean 9:16 (R)">Record</button>
  </div>
  <div id="hint">space play · ← → scenes · R record-mode · F fullscreen</div>

<script>
(function(){
  "use strict";
  var C = {
    coral:"var(--coral)", purple:"var(--purple)", green:"var(--green)"
  };

  // Reusable frame fragments -------------------------------------------------
  function talkingHead(label){
    return '<div class="split-marker"></div>'+
      '<div class="head">'+
        '<div class="tag">'+label+'</div>'+
        '<div class="shoulders"></div><div class="face"></div>'+
        '<div class="wave">'+
          '<span style="height:14px;animation-delay:0s"></span>'+
          '<span style="height:26px;animation-delay:.1s"></span>'+
          '<span style="height:34px;animation-delay:.2s"></span>'+
          '<span style="height:20px;animation-delay:.3s"></span>'+
          '<span style="height:30px;animation-delay:.15s"></span>'+
          '<span style="height:12px;animation-delay:.25s"></span>'+
        '</div>'+
      '</div>';
  }
  function pip(cap){ return '<div class="pip"></div><div class="pip-cap">'+(cap||'head returns as corner bubble')+'</div>'; }
  function li(box, color, text){
    return '<div class="li"><span class="bx" style="background:'+color+'22;color:'+color+'">'+box+'</span>'+text+'</div>';
  }

  // Scenes -------------------------------------------------------------------
  var SCENES = [
    // 1 · HOOK ---------------------------------------------------------------
    { dur:14, res:"1080 × 1920 · 9:16",
      frame:
        '<div class="split-top">'+
          '<div class="kicker">Agents × the web</div>'+
          '<h1 style="font-size:60px;margin-top:16px">Give your<br>agent a<br><span style="color:var(--coral)">real browser.</span></h1>'+
          '<p class="sub" style="font-size:24px;line-height:1.45;margin-top:26px">One small API. It drives real Chromium — so your agent can open <em>any</em> site.</p>'+
        '</div>'+
        talkingHead('Talking head · webcam'),
      notes:{ n:"Now", now:"Hook in 3 sec — say the payoff first.", c:"1 / 6",
        beats:["Keep the energy up","“Here’s how easy it is…”"] } },

    // 2 · REPO ---------------------------------------------------------------
    { dur:24, res:"head off · full-bleed",
      frame:
        '<div class="full">'+
          '<div class="kicker">Step 01 · open source</div>'+
          '<h1 style="font-size:58px;margin-top:16px">It’s all<br>open source.</h1>'+
          '<div class="panel" style="margin-top:30px">'+
            '<div class="row" style="margin-bottom:6px">'+
              '<svg width="26" height="26" viewBox="0 0 16 16" fill="var(--cream)"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>'+
              '<span style="font-family:var(--mono);font-size:22px;color:var(--cream)">alnutile/browser</span>'+
            '</div>'+
            '<div style="font-family:var(--sans);font-size:18px;color:var(--muted);margin:2px 0 22px 38px">A headless browser your agents drive over HTTP.</div>'+
            '<div class="list">'+
              li('↳','var(--coral)','Any JS page → clean <b style="color:var(--cream)">Markdown</b>')+
              li('⚿','var(--purple)','Logins that survive redeploys')+
              li('◈','var(--green)','Click, type, screenshot, run JS')+
              li('★','var(--gold)','Token-protected — not an open proxy')+
            '</div>'+
          '</div>'+
        '</div>'+ pip('★ github.com/alnutile/browser'),
      notes:{ n:"Now", now:"Show the repo + README features.", c:"2 / 6",
        beats:["Scroll the Features list","“Fork it, it’s all here”"] } },

    // 3 · RAILWAY ------------------------------------------------------------
    { dur:26, res:"head off · full-bleed",
      frame:
        '<div class="full">'+
          '<div class="kicker">Step 02 · deploy</div>'+
          '<h1 style="font-size:56px;margin-top:16px">Live on Railway<br>in minutes.</h1>'+
          '<div class="panel" style="margin-top:30px">'+
            '<div class="row" style="justify-content:space-between;margin-bottom:22px">'+
              '<span style="font-family:var(--mono);font-size:20px;color:var(--cream)">browser</span>'+
              '<span class="row" style="gap:8px"><span style="width:9px;height:9px;border-radius:50%;background:var(--green)"></span><span style="font-family:var(--mono);font-size:15px;color:var(--green)">Online</span></span>'+
            '</div>'+
            '<div class="list">'+
              li('✓','var(--green)','Dockerfile detected — Chromium baked in')+
              li('✓','var(--green)','Volume mounted at <b style="color:var(--cream)">/data</b>')+
              li('✓','var(--coral)','Env vars <b style="color:var(--cream)">already there</b>')+
              li('✓','var(--green)','Healthcheck <b style="color:var(--cream)">/health</b> passing')+
            '</div>'+
          '</div>'+
          '<div class="row" style="gap:10px;margin-top:20px"><span class="chip">CPU ~0</span><span class="chip">≈ $5 / mo</span><span class="chip">one replica</span></div>'+
        '</div>'+ pip('deploy logs off-frame'),
      notes:{ n:"Now", now:"Repo → add a Volume → deploy.", c:"3 / 6",
        beats:["“Variables were pre-wired”","One replica — Volume keeps logins"] } },

    // 4 · BEARER TOKEN -------------------------------------------------------
    { dur:20, res:"head off · full-bleed",
      frame:
        '<div class="full">'+
          '<div class="kicker">Step 03 · keep it safe</div>'+
          '<h1 style="font-size:58px;margin-top:16px">One token<br>locks it down.</h1>'+
          '<div class="accent-rule" style="width:180px;margin:26px 0 0"></div>'+
          '<div class="code" style="margin-top:28px">'+
            '<div><span class="m">POST</span> <span class="c">/sessions/bot/goto</span></div>'+
            '<div><span class="o">Authorization:</span> <span class="c">Bearer</span> <span class="p">$API_TOKEN</span></div>'+
            '<div style="margin-top:10px"><span class="g">→ 200</span> <span class="m">driving the page…</span></div>'+
            '<div><span style="color:#d16b6b">→ 401</span> <span class="m">no token, no browser</span></div>'+
          '</div>'+
          '<p class="sub" style="font-size:22px;line-height:1.45;margin-top:26px">Every call needs the bearer token. Set it once in Railway’s variables.</p>'+
        '</div>'+ pip('you, explaining the token'),
      notes:{ n:"Now", now:"Bearer token = not an open proxy.", c:"4 / 6",
        beats:["Set API_TOKEN in Railway vars","openssl rand -hex 32"] } },

    // 5 · SCREENSHOT DEMO ----------------------------------------------------
    { dur:26, res:"1080 × 1920 · 9:16",
      frame:
        '<div class="full" style="padding-top:64px;justify-content:flex-start">'+
          '<div class="kicker">Step 04 · use it</div>'+
          '<h1 style="font-size:56px;margin-top:16px">Now it can<br><span style="color:var(--coral)">see the web.</span></h1>'+
          '<div class="code" style="margin-top:24px;font-size:15px">'+
            '<div><span class="g">$</span> <span class="c">curl</span> <span class="m">.../sessions/bot/screenshot</span></div>'+
            '<div><span class="p">↳ 200</span> <span class="m">image/png · captured live</span></div>'+
          '</div>'+
          '<div class="shot" style="margin-top:22px">'+
            '<div class="bar"><span class="d" style="background:#E0795A"></span><span class="d" style="background:#D9C46A"></span><span class="d" style="background:#7BB58A"></span><span class="url">https://acme.news/article</span></div>'+
            '<img src="__SHOT__" alt="screenshot captured by the API">'+
          '</div>'+
          '<div style="font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:14px;letter-spacing:.06em">↑ this frame was captured by the API itself</div>'+
        '</div>',
      notes:{ n:"Now", now:"Plain HTTP in — screenshot out.", c:"5 / 6",
        beats:["“Agents use it like any tool”","Same call returns Markdown too"] } },

    // 6 · OUTRO --------------------------------------------------------------
    { dur:10, res:"head off · full-bleed",
      frame:
        '<div class="full" style="justify-content:center">'+
          '<div class="kicker">Ship it</div>'+
          '<h1 style="font-size:74px;margin-top:18px">Give your<br>agents<br><span style="color:var(--coral)">the web.</span></h1>'+
          '<div style="margin-top:34px;display:inline-flex;align-self:flex-start;align-items:center;gap:12px;background:var(--card);border:1px solid var(--hair);border-radius:999px;padding:14px 22px">'+
            '<svg width="22" height="22" viewBox="0 0 16 16" fill="var(--cream)"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>'+
            '<span style="font-family:var(--mono);font-size:20px;color:var(--cream)">github.com/alnutile/browser</span>'+
          '</div>'+
          '<div style="font-family:var(--sans);font-weight:700;font-size:24px;color:var(--body2);margin-top:26px">★ Star · Fork · Deploy</div>'+
        '</div>'+ pip('smile — end on your face'),
      notes:{ n:"Now", now:"Land it slow. Let the line breathe.", c:"6 / 6",
        beats:["Drop to full-face","Repo link in the caption"] } }
  ];

  var TOTAL = SCENES.reduce(function(a,s){return a+s.dur;},0);

  // Render -------------------------------------------------------------------
  var fb = document.getElementById('framebody');
  var notesEl = document.getElementById('notes');
  var resEl = document.getElementById('res');
  var spEl = document.getElementById('sp');
  var i = 0;

  function renderNotes(n){
    var beats = n.beats.map(function(b){
      return '<div class="beat"><span class="sq"></span><span class="tx">'+b+'</span></div>';
    }).join('');
    return '<div class="top"><span class="l">Off-frame notes</span><span class="c">'+n.c+'</span></div>'+
      '<div class="now"><div class="n">'+n.n+'</div><div class="t">'+n.now+'</div></div>'+
      '<div class="beats">'+beats+'</div>'+
      '<div class="foot">← you read this while the frame records</div>';
  }
  function render(idx){
    var s = SCENES[idx];
    fb.innerHTML = s.frame;
    notesEl.innerHTML = renderNotes(s.notes);
    resEl.textContent = s.res;
    updateDots();
  }

  // Dots ---------------------------------------------------------------------
  var dotsEl = document.getElementById('dots');
  SCENES.forEach(function(_,k){
    var b=document.createElement('b'); b.onclick=function(){ go(k,true); };
    dotsEl.appendChild(b);
  });
  function updateDots(){ Array.prototype.forEach.call(dotsEl.children,function(b,k){ b.className = k===i?'on':''; }); }

  // Playback -----------------------------------------------------------------
  var playing=false, sceneStart=0, elapsedBefore=0, raf=null;
  function fmt(t){ t=Math.max(0,Math.floor(t)); return Math.floor(t/60)+':'+('0'+(t%60)).slice(-2); }
  function elapsedTotal(){ var e=0; for(var k=0;k<i;k++) e+=SCENES[k].dur; return e; }
  var timeEl=document.getElementById('time'), playBtn=document.getElementById('play');

  function tick(ts){
    if(!playing) return;
    if(!sceneStart) sceneStart=ts;
    var into=(ts-sceneStart)/1000;
    var dur=SCENES[i].dur;
    var frac=Math.min(1,into/dur);
    spEl.style.width=(frac*100)+'%';
    timeEl.textContent=fmt(elapsedTotal()+into)+' / '+fmt(TOTAL);
    if(into>=dur){
      if(i<SCENES.length-1){ i++; render(i); sceneStart=ts; }
      else { pause(); spEl.style.width='100%'; timeEl.textContent=fmt(TOTAL)+' / '+fmt(TOTAL); return; }
    }
    raf=requestAnimationFrame(tick);
  }
  function play(){ if(i===SCENES.length-1 && parseFloat(spEl.style.width)>=100){ i=0; render(0);} playing=true; playBtn.textContent='❚❚ Pause'; sceneStart=0; raf=requestAnimationFrame(tick); }
  function pause(){ playing=false; playBtn.textContent='▶ Play'; if(raf) cancelAnimationFrame(raf); }
  function toggle(){ playing?pause():play(); }
  function go(idx,stay){ i=Math.max(0,Math.min(SCENES.length-1,idx)); render(i); spEl.style.width='0%'; sceneStart=0; timeEl.textContent=fmt(elapsedTotal())+' / '+fmt(TOTAL); if(playing&&!stay){} }

  document.getElementById('prev').onclick=function(){ pause(); go(i-1); };
  document.getElementById('next').onclick=function(){ pause(); go(i+1); };
  playBtn.onclick=toggle;
  document.getElementById('mode').onclick=function(){ document.body.classList.toggle('record'); fit(); this.textContent=document.body.classList.contains('record')?'Teleprompter':'Record'; };

  // Keyboard -----------------------------------------------------------------
  window.addEventListener('keydown',function(e){
    if(e.key===' '){ e.preventDefault(); toggle(); }
    else if(e.key==='ArrowRight'){ pause(); go(i+1); }
    else if(e.key==='ArrowLeft'){ pause(); go(i-1); }
    else if(e.key==='r'||e.key==='R'){ document.getElementById('mode').click(); }
    else if(e.key==='n'||e.key==='N'){ document.body.classList.toggle('shownotes'); }
    else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  });

  // Fit / scale --------------------------------------------------------------
  function fit(){
    var pad=0.94;
    var deckW = document.body.classList.contains('record')?600:1040;
    var deckH = 1067;
    var s = Math.min((window.innerHeight*pad)/deckH, (window.innerWidth*pad)/deckW);
    document.getElementById('deck').style.setProperty('--s', s);
  }
  window.addEventListener('resize', fit);

  render(0); fit();
  timeEl.textContent='0:00 / '+fmt(TOTAL);
})();
</script>
</body>
</html>
